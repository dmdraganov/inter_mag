<!DOCTYPE html> <!-- Тип документа -->
<html lang="ru"> <!-- Корневой элемент -->
<head> <!-- Шапка -->
    <meta charset="UTF-8"> <!-- Кодировка -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Адаптивность -->
    <title>Корзина - TechStore</title> <!-- Заголовок -->
    <link rel="stylesheet" href="styles.css"> <!-- Стили -->
</head> <!-- Конец head -->
<body> <!-- Тело -->
    <!-- Header -->
    <header class="header"> <!-- Шапка сайта -->
        <div class="container header-container"> <!-- Контейнер -->
            <div class="logo"> <!-- Логотип -->
                <a href="index.html"><h1>TechStore</h1></a> <!-- Ссылка на главную -->
            </div> <!-- Конец логотипа -->
            <nav class="nav" id="nav"> <!-- Навигация -->
                <ul class="nav-list"> <!-- Список меню -->
                    <li><a href="index.html">Каталог</a></li> <!-- Пункт -->
                    <li><a href="favorites.html">Избранное <span class="badge" id="favCount">0</span></a></li> <!-- Избранное -->
                    <li><a href="cart.html" class="active">Корзина <span class="badge" id="cartCount">0</span></a></li> <!-- Корзина -->
                    <li><a href="profile.html">Личный кабинет</a></li> <!-- Профиль -->
                    <li><a href="admin.html">Админ панель</a></li> <!-- Админ -->
                    <li><a href="about.html">О нас</a></li> <!-- О нас -->
                    <li><a href="contacts.html">Контакты</a></li> <!-- Контакты -->
                </ul> <!-- Конец списка -->
            </nav> <!-- Конец навигации -->
            <button class="burger" id="burger"> <!-- Бургер -->
                <span></span> <!-- Линия -->
                <span></span> <!-- Линия -->
                <span></span> <!-- Линия -->
            </button> <!-- Конец кнопки -->
        </div> <!-- Конец контейнера -->
    </header> <!-- Конец header -->

    <!-- Main Content -->
    <main class="main"> <!-- Основной контент -->
        <div class="container"> <!-- Контейнер -->
            <div class="content-wrapper-full"> <!-- Обертка -->
                <div class="content"> <!-- Контент -->
                    <h2>Корзина</h2> <!-- Заголовок -->
                    <div class="cart-container"> <!-- Контейнер корзины -->
                        <table class="cart-table" id="cartTable"> <!-- Таблица -->
                            <thead> <!-- Заголовок таблицы -->
                                <tr> <!-- Строка заголовков -->
                                    <th>№</th> <!-- Колонка -->
                                    <th>Наименование</th> <!-- Колонка -->
                                    <th>Цена</th> <!-- Колонка -->
                                    <th>Количество</th> <!-- Колонка -->
                                    <th>Сумма</th> <!-- Колонка -->
                                    <th>Действия</th> <!-- Колонка -->
                                </tr> <!-- Конец строки -->
                            </thead> <!-- Конец thead -->
                            <tbody id="cartTableBody"></tbody> <!-- Тело таблицы -->
                        </table> <!-- Конец таблицы -->
                        <div class="cart-total"> <!-- Итог корзины -->
                            <h3>Общая сумма: <span id="totalPrice">0</span> ₽</h3> <!-- Итог -->
                            <a href="checkout.html" class="btn btn-primary" id="checkoutBtn">Оформить заказ</a> <!-- Кнопка -->
                        </div> <!-- Конец итога -->
                    </div> <!-- Конец контейнера -->
                    <p class="empty-message" id="emptyCart" style="display: none;">Корзина пуста</p> <!-- Сообщение -->
                </div> <!-- Конец контента -->
            </div> <!-- Конец обертки -->
        </div> <!-- Конец контейнера -->
    </main> <!-- Конец main -->

    <!-- Footer -->
    <footer class="footer"> <!-- Подвал -->
        <div class="container"> <!-- Контейнер -->
            <p>&copy; 2026 TechStore. Все права защищены.</p> <!-- Копирайт -->
        </div> <!-- Конец контейнера -->
    </footer> <!-- Конец подвала -->

    <script src="data.js"></script> <!-- Данные -->
    <script src="cart.js"></script> <!-- Скрипт корзины -->
    <script src="auth.js"></script> <!-- Авторизация -->
</body> <!-- Конец body -->
</html> <!-- Конец документа -->
